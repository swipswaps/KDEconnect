# KDE Connect Manager Configuration Example
# Copy this file to config.yaml and customize as needed

# Server Configuration
server:
  host: "0.0.0.0"
  port: 5000
  debug: false
  secret_key: "change-this-in-production"

# Monitoring Configuration
monitoring:
  enabled: true
  check_interval: 30  # seconds
  max_history_size: 1000
  auto_fix: true

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "logs/kdeconnect-manager.log"
  max_size_mb: 10
  backup_count: 5
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# KDE Connect Configuration
kdeconnect:
  daemon_path: "/usr/bin/kdeconnectd"
  cli_path: "/usr/bin/kdeconnect-cli"
  config_dir: "~/.config/kdeconnect/"
  auto_start_daemon: true

# Firewall Configuration
firewall:
  enabled: true
  zone: "public"
  tcp_ports: "1714-1764"
  udp_ports: "1714-1764"

# SSH Configuration
ssh:
  default_port: 22
  connection_timeout: 10
  key_file: "~/.ssh/id_rsa"

# Screen Sharing Configuration
screenshare:
  preferred_method: "auto"  # auto, krfb, x11vnc, pipewire
  vnc_port: 5900
  vnc_password: null  # Set if needed

# Notifications
notifications:
  desktop_notifications: true
  sound_enabled: false
  low_battery_threshold: 20

# Security
security:
  allowed_hosts:
    - "localhost"
    - "127.0.0.1"
  max_connections: 100
  rate_limit: "100/hour"

# Features
features:
  health_monitoring: true
  auto_reconnect: true
  self_healing: true
  remote_management: true
  screen_sharing: true
